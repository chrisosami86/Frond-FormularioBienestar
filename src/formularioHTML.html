<main id="contenedor-form">
    
    <h1 class="text-2xl font-bold">Formulario de Registro</h1>
    <form id="registro-form2">
        <label for="fecha-hora">Registro:</label>
        <input type="text" id="fecha-hora" name="fecha-hora" value="" readonly>

        <label for="codigo-estudiante">Código de Estudiante:</label>
        <input type="number" id="codigo-estudiante" placeholder="Código sin el 20 y sin el programa"
            name="codigo-estudiante" required readonly>

        <label for="numero-identificacion">Número de Identificación:</label>
        <input type="text" id="numero-identificacion" placeholder="Numero de cedula o tarjeta de identidad"
            name="numero-identificacion" required readonly>

        <label for="nombre-estudiante">Nombre Completo:</label>
        <input type="text" id="nombre-estudiante" placeholder="Nombres y apellidos" name="nombre-estudiante" required readonly>

        <label for="correo">Correo Electrónico:</label>
        <input type="email" id="correo" placeholder="Correo institucional" name="correo" required readonly>



        <label for="programa-academico">Programa Académico:</label>
        <input type="text" id="programa-academico" placeholder="Programa al que pertece" name="programa-academico"
            required readonly>


        <label for="recibo-conforme">Recibo Conforme:</label>
        <input type="text" id="recibo-conforme" placeholder="Si o No" name="recibo-conforme" required readonly>


        <button type="submit">Enviar</button>
    </form>
</main>
<script>
    // Establecer la fecha y hora actual en el campo correspondiente
    document.getElementById('fecha-hora').value = new Date().toLocaleString();
</script>
